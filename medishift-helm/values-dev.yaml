global:
  namespace: medishift-dev
  environment: development
  imageTag: latest
images:
  repository: revanth654
  pullPolicy: Always
# Frontend
frontend:
  name: medishift-frontend
  image: medishift-frontend
  tag: v0.0.6-develop.0
  replicas: 2
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
# Auth Service
auth:
  name: medishift-auth-service
  image: medishift-auth
  tag: v0.0.5-develop.1
  replicas: 2
  port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
# Staff Service
staff:
  name: medishift-staff-service
  image: medishift-staff
  tag: v0.0.5-develop.0
  replicas: 2
  port: 3002
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
# Shift Service
shift:
  name: medishift-shift-service
  image: medishift-shift
  tag: v0.0.4-develop.0
  replicas: 2
  port: 3003
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
# Leave Service
leave:
  name: medishift-leave-service
  image: medishift-leave
  tag: v0.0.4-develop.0
  replicas: 2
  port: 3004
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
postgres:
  name: medishift-postgres
  image: postgres
  tag: 15-alpine
  port: 5432
  storage: 5Gi
  storageClassName: "medishift-development-storage"
  nfsServer: 172.31.26.181
  nfsPath: /srv/nfs/medishift
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
config:
  nodeEnv: development
  authServiceUrl: http://medishift-auth-service.medishift-dev.svc.cluster.local:3001
  staffServiceUrl: http://medishift-staff-service.medishift-dev.svc.cluster.local:3002
  shiftServiceUrl: http://medishift-shift-service.medishift-dev.svc.cluster.local:3003
  leaveServiceUrl: http://medishift-leave-service.medishift-dev.svc.cluster.local:3004
secrets:
  create: true
  databaseUrl: "postgresql://medishift:medishift123@medishift-postgres.medishift-dev.svc.cluster.local:5432/medishift"
  jwtSecret: "medishift_jwt_secret_key_2024"
  postgresUser: "medishift"
  postgresPassword: "medishift123"
  postgresDb: "medishift"
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuThreshold: 70
  memoryThreshold: 80
gateway:
  name: medishift-gateway
  className: eg
  port: 80
  nodePort: 31000
networkPolicies:
  enabled: true
releaseName: medishift-dev
