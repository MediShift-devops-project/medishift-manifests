# Global settings
global:
  namespace: medishift-prod
  environment: production
  imageTag: latest

# Image settings
images:
  repository: revanth654
  pullPolicy: Always

# Frontend
frontend:
  name: medishift-frontend
  image: medishift-frontend
  tag: v3
  replicas: 2
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Auth Service
auth:
  name: medishift-auth-service
  image: medishift-auth
  tag: v2
  replicas: 2
  port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Staff Service
staff:
  name: medishift-staff-service
  image: medishift-staff
  tag: v2
  replicas: 2
  port: 3002
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Shift Service
shift:
  name: medishift-shift-service
  image: medishift-shift
  tag: v2
  replicas: 2
  port: 3003
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Leave Service
leave:
  name: medishift-leave-service
  image: medishift-leave
  tag: v2
  replicas: 2
  port: 3004
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# PostgreSQL
postgres:
  name: medishift-postgres
  image: postgres
  tag: 15-alpine
  port: 5432
  storage: 5Gi
  nfsServer: 172.31.26.181
  nfsPath: /srv/nfs/medishift-prod
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ConfigMap
config:
  nodeEnv: production
  authServiceUrl: http://medishift-auth-service.medishift-prod.svc.cluster.local:3001
  staffServiceUrl: http://medishift-staff-service.medishift-prod.svc.cluster.local:3002
  shiftServiceUrl: http://medishift-shift-service.medishift-prod.svc.cluster.local:3003
  leaveServiceUrl: http://medishift-leave-service.medishift-prod.svc.cluster.local:3004

# Secrets
secrets:
  create: true
  databaseUrl: ""
  jwtSecret: ""
  postgresUser: ""
  postgresPassword: ""
  postgresDb: ""

# HPA
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuThreshold: 70
  memoryThreshold: 80

# Gateway
gateway:
  name: medishift-gateway
  className: eg
  port: 80

# Network Policies
networkPolicies:
  enabled: true

releaseName: medishift-prod
