apiVersion: v1
kind: PersistentVolume
metadata:
  name: medishift-postgres-{{ .Values.global.environment }}-pv
spec:
  capacity:
    storage: {{ .Values.postgres.storage }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: {{ .Values.postgres.nfsServer }}
    path: {{ .Values.postgres.nfsPath }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: medishift-postgres-{{ .Values.global.environment }}-pvc
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
  volumeName: medishift-postgres-{{ .Values.global.environment }}-pv
