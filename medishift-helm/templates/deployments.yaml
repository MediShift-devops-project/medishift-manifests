# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.auth.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.auth.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.auth.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.auth.name }}
    spec:
      serviceAccountName: {{ .Values.auth.name }}-sa
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ .Values.postgres.name }} {{ .Values.postgres.port }}; do echo waiting for postgres; sleep 3; done
      containers:
        - name: auth-service
          image: {{ .Values.images.repository }}/{{ .Values.auth.image }}:{{ .Values.auth.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: {{ .Values.auth.port }}
          env:
            - name: PORT
              value: "{{ .Values.auth.port }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: medishift-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medishift-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: medishift-config
                  key: NODE_ENV
            - name: STAFF_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medishift-config
                  key: STAFF_SERVICE_URL
          resources:
            requests:
              cpu: {{ .Values.auth.resources.requests.cpu }}
              memory: {{ .Values.auth.resources.requests.memory }}
            limits:
              cpu: {{ .Values.auth.resources.limits.cpu }}
              memory: {{ .Values.auth.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
